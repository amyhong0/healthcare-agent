<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welda - 내 손안의 혈당 다이어트 코치</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --welda-primary: #10B981; /* 웰다 시그니처 헬시 그린 */
            --welda-dark-green: #065F46; /* 깊은 그린 (타이틀용) */
            --welda-bg: #FAFAF9; /* 따뜻하고 부드러운 스톤 화이트 배경 */
            --welda-accent: #F59E0B; /* 혈당 스파이크 경고/포인트 오렌지 */
            --chat-user: #ECFDF5; /* 유저 말풍선 (연한 민트 그린) */
            --chat-bot: #FFFFFF; /* 코치 말풍선 (순백색) */
            --text-main: #1F2937; /* 다크 그레이 문장 컬러 */
            --text-muted: #6B7280; /* 연한 그레이 로그 컬러 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--welda-bg); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 스마트폰 앱 뷰포트 레이아웃 */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 92vh;
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #E5E7EB;
        }

        /* 상단 헤더 영역 */
        .app-header {
            background: #FFFFFF;
            padding: 20px;
            border-bottom: 1px solid #F3F4F6;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .app-header .avatar {
            width: 42px;
            height: 42px;
            background: var(--welda-primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FFFFFF;
            font-size: 20px;
        }
        .app-header .title-area h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--welda-dark-green);
        }
        .app-header .title-area p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 테크 리드 검증용 배너 */
        .tech-badge {
            background: #EFF6FF;
            color: #1D4ED8;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            border-bottom: 1px solid #DBEAFE;
        }

        /* 채팅 스크롤 영역 */
        .chat-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--welda-bg);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 대화 말풍선 공통 스타일 */
        .message-row { display: flex; flex-direction: column; width: 100%; }
        .message-row.user { align-items: flex-end; }
        .message-row.bot { align-items: flex-start; }

        .bubble {
            max-width: 85%;
            padding: 14px 16px;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .user .bubble {
            background-color: var(--chat-user);
            color: var(--welda-dark-green);
            border-radius: 18px 18px 2px 18px;
            font-weight: 500;
        }
        .bot .bubble {
            background-color: var(--chat-bot);
            color: var(--text-main);
            border-radius: 18px 18px 18px 2px;
            border: 1px solid #E5E7EB;
        }

        /* 에이전트 연동 로그 타임라인 구조 (면접관 가독성 핵심) */
        .agent-log {
            width: 100%;
            background: #F3F4F6;
            border-left: 3px solid var(--welda-accent);
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 12px;
            color: #4B5563;
            margin: 4px 0;
        }
        .agent-log-title {
            font-weight: 700;
            color: var(--welda-accent);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 하단 입력 창 */
        .app-footer {
            padding: 16px;
            background: #FFFFFF;
            border-top: 1px solid #F3F4F6;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .app-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 30px;
            border: 1px solid #E5E7EB;
            font-size: 14px;
            background: #F9FAFB;
            outline: none;
            transition: all 0.2s;
        }
        .app-input:focus {
            border-color: var(--welda-primary);
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .send-btn {
            width: 46px;
            height: 46px;
            background: var(--welda-primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        .send-btn:hover { background: var(--welda-dark-green); }
        
        /* 스크롤바 커스텀 */
        .chat-content::-webkit-scrollbar { width: 6px; }
        .chat-content::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <div class="avatar"><i class="fa-solid fa-heart-pulse"></i></div>
            <div class="title-area">
                <h1>Welda 개인화 다이어트 코치</h1>
                <p>Multi-Agent 기반 맞춤형 혈당 관리</p>
            </div>
        </div>

        <div class="tech-badge">
            <i class="fa-solid fa-gears"></i> YAML 선언적 프롬프트 & Context Chaining 파이프라인 작동 중
        </div>

        <div class="chat-content" id="chat-box">
            <div class="message-row bot">
                <div class="bubble">
                    안녕하세요! 대웅제약 웰다 다이어트 코치입니다. 🍏오늘 드신 식단을 자유롭게 입력해 주시면 혈당 예측 분석과 함께 개인화 가이드를 드릴게요!
                </div>
            </div>
        </div>

        <div class="app-footer">
            <div class="input-wrapper">
                <input type="text" id="input-box" class="app-input" placeholder="오늘 식단을 기록해보세요 (예: 짜장면과 탕수육)" onkeypress="if(event.keyCode==13) sendMessage()">
            </div>
            <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('input-box');
            const chatBox = document.getElementById('chat-box');
            const message = input.value.trim();
            if(!message) return;

            // 1. 유저 말풍선 추가
            chatBox.innerHTML += `
                <div class="message-row user">
                    <div class="bubble">${message}</div>
                </div>
            `;
            
            const payload = { message: message, history: chatHistory };
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 로딩 인디케이터 표시
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `
                <div class="message-row bot" id="${loadingId}">
                    <div class="bubble" style="color:var(--text-muted); background:none; box-shadow:none; border:none;">
                        <i class="fa-solid fa-circle-notch fa-spin"></i> 웰다 엔진이 컨텍스트 분석 중...
                    </div>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 2. 버셀 서버리스 API 엔드포인트 호출
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                // 로딩 제거
                document.getElementById(loadingId).remove();

                // 3. 내부 멀티에이전트 로그 결합 및 결과 출력
                chatBox.innerHTML += `
                    <div class="message-row bot">
                        <div class="agent-log">
                            <div class="agent-log-title"><i class="fa-solid fa-microchip"></i> Agent 1: 영양 분석 인프라 로그</div>
                            ${data.analysis_log}
                        </div>
                        <div class="bubble" style="margin-top: 6px;">
                            ${data.answer}
                        </div>
                    </div>
                `;
                
                // 4. 컨텍스트 유지를 위한 내부 메모리 적재
                chatHistory.push({ role: "user", content: message });
                chatHistory.push({ role: "assistant", content: data.answer });
                
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `
                    <div class="message-row bot">
                        <div class="bubble" style="background:#FEF2F2; color:#991B1B; border-color:#FCA5A5;">
                            <i class="fa-solid fa-triangle-exclamation"></i> 시스템 연동 중 에러가 발생했습니다. 환경변수(API Key)를 확인해 주세요.
                        </div>
                    </div>
                `;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
