<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Welda Prototype</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f9f9f9; }
        #chat-box { height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 15px; background: #fff; margin-bottom: 10px; border-radius: 8px; }
        .user { color: blue; margin: 5px 0; text-align: right; }
        .bot { color: green; margin: 5px 0; text-align: left; }
        .log { font-size: 11px; color: #777; background: #eee; padding: 5px; border-radius: 4px; margin: 5px 0; }
        #input-box { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h2>🥗 Welda-Mini 버셀 프로토타입</h2>
    <div id="chat-box"></div>
    <input type="text" id="input-box" placeholder="오늘 뭐 드셨나요?">
    <button onclick="sendMessage()">전송</button>

    <script>
        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('input-box');
            const chatBox = document.getElementById('chat-box');
            const message = input.value;
            if(!message) return;

            // 유저 말풍선 추가
            chatBox.innerHTML += `<div class="user"><b>나:</b> ${message}</div>`;
            
            // API 요청용 데이터 바인딩
            const payload = { message: message, history: chatHistory };
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 버셀 루트의 API 엔드포인트 호출
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            // 내부 연동 로그 및 에이전트 결과 출력
            chatBox.innerHTML += `<div class="log">🔍 영양분석 로그: ${data.analysis_log}</div>`;
            chatBox.innerHTML += `<div class="bot"><b>코치:</b> ${data.answer}</div>`;
            
            // 메모리 업데이트
            chatHistory.push({ role: "user", content: message });
            chatHistory.push({ role: "assistant", content: data.answer });
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
